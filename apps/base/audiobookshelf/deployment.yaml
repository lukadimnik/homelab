apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      # securityContext:
      #   fsGroup: 1000 # user node group ID
      #   runAsUser: 1000 # user node user ID
      #   runAsGroup: 1000 # user node group ID
      containers:
        - name: audiobookshelf
          envFrom:
            - configMapRef:
                name: audiobookshelf-configmap 
          image: ghcr.io/advplyr/audiobookshelf:2.35.0
          ports:
            - containerPort: 3005
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: audiobookshelf-data
              mountPath: /etc/audiobookshelf/config
            - name: audiobookshelf-data
              mountPath: /etc/audiobookshelf/metadata
      volumes:
        - name: audiobookshelf-data
          persistentVolumeClaim:
            claimName: audiobookshelf-data-pvc
