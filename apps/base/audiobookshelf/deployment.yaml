apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 1000 # user node group ID
        runAsUser: 1000 # user node user ID
        runAsGroup: 1000 # user node group ID
      containers:
        - name: audiobookshelf
          # envFrom:
          #   - secretRef:
          #       name: linkding-container-dev
          image: ghcr.io/advplyr/audiobookshelf:2.35.0
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
      #     volumeMounts:
      #       - name: linkding-data
      #         mountPath: /etc/linkding/data
      # volumes:
      #   - name: linkding-data
      #     persistentVolumeClaim:
      #       claimName: linkding-data-pvc
