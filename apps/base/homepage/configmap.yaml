apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Home
    theme: dark
    color: slate
    background:
      opacity: 80
  custom.css: |
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #164e63 100%);
      background-attachment: fixed;
    }
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - Self Hosted:
        - Linkding:
            icon: linkding.png
            href: https://linkdinghp.lukadimnik.com/
            description: Bookmark manager
        - Grafana:
            icon: grafana.png
            href: http://grafana.lukadimnik.com/
            description: Metrics & dashboards
        - Audiobookshelf:
            icon: audiobookshelf.png
            href: http://audiobookshelfhp.lukadimnik.com/
            description: Audiobook & podcast server
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
