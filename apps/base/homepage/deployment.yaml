apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        # Seed the writable config dir from the ConfigMap. Homepage then owns
        # /app/config and can self-create any required file it ships (e.g.
        # proxmox.yaml) instead of crash-looping on a read-only mount.
        - name: copy-config
          image: ghcr.io/gethomepage/homepage:v1.13.2
          command:
            - sh
            - -c
            - cp /config-src/* /app/config/
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: /config-src
              name: config-src
            - mountPath: /app/config
              name: config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.2
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.lukadimnik.com
          ports:
            - containerPort: 3000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: /app/config
              name: config
      volumes:
        - name: config-src
          configMap:
            name: homepage
        - name: config
          emptyDir: {}
